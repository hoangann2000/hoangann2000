name: Generate profile metrics

on:
  schedule:
    # 00:00 UTC daily = 07:00 Vietnam time
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  metrics:
    runs-on: ubuntu-latest
    steps:
      # Overview card: commits, stars, followers, activity
      - name: Overview
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN || secrets.GITHUB_TOKEN }}
          filename: assets/metrics.overview.svg
          user: hoangann2000
          template: classic
          base: header, activity, community, repositories
          config_timezone: Asia/Ho_Chi_Minh
          config_display: large

      # Language breakdown, weighted by lines actually written
      - name: Languages
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN || secrets.GITHUB_TOKEN }}
          filename: assets/metrics.languages.svg
          user: hoangann2000
          base: ""
          config_timezone: Asia/Ho_Chi_Minh
          plugin_languages: yes
          plugin_languages_details: bytes-size, percentage
          plugin_languages_limit: 8
          plugin_languages_sections: most-used
          plugin_languages_indepth: no

      # Contribution calendar as an isometric 3D grid
      - name: Isometric calendar
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN || secrets.GITHUB_TOKEN }}
          filename: assets/metrics.calendar.svg
          user: hoangann2000
          base: ""
          config_timezone: Asia/Ho_Chi_Minh
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year

      # Coding habits: when and how you work
      - name: Habits
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN || secrets.GITHUB_TOKEN }}
          filename: assets/metrics.habits.svg
          user: hoangann2000
          base: ""
          config_timezone: Asia/Ho_Chi_Minh
          plugin_habits: yes
          plugin_habits_from: 200
          plugin_habits_days: 14
          plugin_habits_charts: yes
          plugin_habits_facts: yes
